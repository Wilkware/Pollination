<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Pollination</title>
    <style>
        :root {
            /* Pollen level colors */
            --pollen-1: #dbfac8;
            --pollen-2: #fee492;
            --pollen-3: #fec54d;
            --pollen-4: #fe9a24;
            --pollen-5: #f0381a;
            --pollen-6: #be0021;
        }

        /* app-like scrollbar only for google chrome (pc) */
        @supports (-webkit-appearance:none) and (not (overflow:-webkit-marquee)) and (not (-ms-ime-align:auto)) and (not (-moz-appearance:none)) {
            ::-webkit-scrollbar {
                height: 4px;
                width: 4px;
            }

            ::-webkit-scrollbar-track {
                border-radius: 5px;
                background: transparent;
                border: solid 3px transparent;
            }

            /* Handle */
            ::-webkit-scrollbar-thumb {
                border-radius: 5px;
                background: transparent;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: gray;
            }

            /* Corner */
            ::-webkit-scrollbar-corner {
                background: transparent;
            }
        }

        html,
        body {
            box-sizing: border-box;
            overflow: auto;
        }

        .controls {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            gap: 8px;
        }

        .orientation-toggle {
            display: flex;
            background: color-mix(in srgb, var(--accent-color), transparent 90%);
            border-radius: 5px;
        }

        .orientation-toggle button {
            padding: 6px 14px;
            border: none;
            background: transparent;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            color: var(--accent-color);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .orientation-toggle button.active {
            background: var(--accent-color);
            color: var(--content-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        /* Vertical Layout: Zeile = Pollenart, Spalten = Tage */
        .forecast-grid.vertical {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .forecast-grid.vertical .day-header {
            display: grid;
            grid-template-columns: 120px repeat(auto-fit, minmax(80px, 1fr));
            gap: 0;
        }

        .forecast-grid.vertical .day-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            color: var(--accent-color);
            text-transform: uppercase;
            gap: 4px;
            background: color-mix(in srgb, var(--accent-color) 10%, transparent);
            padding: 4px;
            border-radius: 5px;
            transition: all 0.3s ease;
            margin: 4px;
        }

        .forecast-grid.vertical .day-label.empty {
            background: none !important;
        }

        .forecast-grid.vertical .day-number {
            color: var(--content-color);
            font-size: 18px;
        }

        .forecast-grid.vertical .pollen-row {
            display: grid;
            grid-template-columns: 120px repeat(auto-fit, minmax(80px, 1fr));
            gap: 0;
            transition: all 0.3s ease;
        }

        .forecast-grid.vertical .pollen-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            color: var(--accent-color);
            text-transform: uppercase;
            gap: 4px;
            background: color-mix(in srgb, var(--accent-color) 10%, transparent);
            padding: 4px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin: 4px;
        }

        .forecast-grid.vertical .pollen-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.3s ease;
            background: color-mix(in srgb, var(--content-color) 3%, transparent);
            padding: 4px;
            border-radius: 5px;
            transition: all 0.3s ease;
            margin: 4px;
        }

        .forecast-grid.vertical .pollen-cell:hover {
            background: color-mix(in srgb, var(--accent-color) 20%, transparent);
            transform: scale(1.05);
            box-shadow: 0 3px 6px rgba(102, 126, 234, 0.15);
        }

        /* Horizontal Layout: Zeile = Tag, Spalten = Pollenarten */
        .forecast-grid.horizontal {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .pollen-label-header.empty {
            background: none !important;
        }

        .forecast-grid.horizontal .pollen-header {
            display: grid;
            grid-template-columns: 120px repeat(auto-fit, minmax(80px, 1fr));
            gap: 0;
        }

        .forecast-grid.horizontal .pollen-label-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            color: var(--accent-color);
            text-transform: uppercase;
            gap: 4px;
            background: color-mix(in srgb, var(--accent-color) 10%, transparent);
            padding: 4px;
            border-radius: 5px;
            transition: all 0.3s ease;
            margin: 4px;
        }

        .forecast-grid.horizontal .pollen-label-header .pollen-icon {
            width: 42px;
            height: 42px;
        }

        .forecast-grid.horizontal .day-row {
            display: grid;
            grid-template-columns: 120px repeat(auto-fit, minmax(80px, 1fr));
            gap: 0;
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out backwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .forecast-grid.horizontal .day-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            gap: 4px;
            color: var(--accent-color);
            background: color-mix(in srgb, var(--accent-color) 10%, transparent);
            text-transform: uppercase;
            padding: 4%;
            border-radius: 5px;
            transition: all 0.3s ease;
            margin: 4px;
        }

        .forecast-grid.horizontal .day-number {
            color: var(--content-color);
            font-size: 24px;
        }

        .forecast-grid.horizontal .pollen-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: color-mix(in srgb, var(--content-color) 3%, transparent);
            padding: 4px;
            border-radius: 5px;
            transition: all 0.3s ease;
            margin: 4px;
        }

        .forecast-grid.horizontal .pollen-cell:hover {
            background: color-mix(in srgb, var(--accent-color) 20%, transparent);
            transform: scale(1.05);
            box-shadow: 0 3px 6px rgba(255, 88, 8, 0.15);
        }

        .pollen-icon {
            width: 42px;
            height: 42px;
        }

        .pollen-indicator {
            width: 64px;
            height: 64px;
        }

        .pollen-level {
            font-size: 10px;
            text-transform: capitalize;
        }
    </style>
</head>

        // Hier werden die Daten vom Modul verarbeitet.
        function handleMessage(data) {
            //console.log('Rohdaten empfangen:', data);
            const decodedData = JSON.parse(data);
            //console.log('Decodierte Daten:', decodedData);
            for (const parameter in decodedData) {
                console.log('Parameter:', parameter, 'Wert:', decodedData[parameter]);
                switch (parameter) {
                    case 'update':
                        pollenUpdateTime = decodedData[parameter];
                        break;
                    case 'index':
                        if (decodedData[parameter] === null) {
                            console.warn('Pollenindex ist null, möglicherweise ungültige Daten oder Fehler bei der Datenbereitstellung.');
                            return;
                        }
                        pollenIndexInfo = decodedData[parameter];
                        renderForecast();
                        break;
                    default:
                        console.log('Unbekannter Parameter:', parameter);
                        break;
                }
            }
        }

        // Erstelle SVG Indikator mit Segmenten und Lücken
        function createIndicator(level) {
            const segments = 6;
            const gapAngle = 4; // Grad zwischen Segmenten
            const segmentAngle = (360 / segments) - gapAngle;
            const segmentColors = [
                'var(--pollen-1)',
                'var(--pollen-2)',
                'var(--pollen-3)',
                'var(--pollen-4)',
                'var(--pollen-5)',
                'var(--pollen-6)'
            ];
            const emptyColor = 'var(--content-color)';

            let paths = '';
            for (let i = 0; i < segments; i++) {
                const startAngle = (i * (segmentAngle + gapAngle) - 90) * Math.PI / 180;
                const endAngle = (i * (segmentAngle + gapAngle) + segmentAngle - 90) * Math.PI / 180;
                const outerRadius = 30;
                const innerRadius = 20;

                const x1 = 32 + outerRadius * Math.cos(startAngle);
                const y1 = 32 + outerRadius * Math.sin(startAngle);
                const x2 = 32 + outerRadius * Math.cos(endAngle);
                const y2 = 32 + outerRadius * Math.sin(endAngle);
                const x3 = 32 + innerRadius * Math.cos(endAngle);
                const y3 = 32 + innerRadius * Math.sin(endAngle);
                const x4 = 32 + innerRadius * Math.cos(startAngle);
                const y4 = 32 + innerRadius * Math.sin(startAngle);

                // Jedes Segment hat seine eigene Farbe, wird aber nur gefüllt wenn level >= i+1
                const isFilled = (i + 1) <= level;
                const color = isFilled ? segmentColors[i] : emptyColor;
                const opacity = isFilled ? 1 : 0.3;

                paths += `<path d="M ${x1} ${y1} A ${outerRadius} ${outerRadius} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${innerRadius} ${innerRadius} 0 0 0 ${x4} ${y4} Z" fill="${color}" opacity="${opacity}"/>`;
            }

            // Zahl in der Mitte einsetzen
            const textColor = level > 0 ? segmentColors[level - 1] : emptyColor;
            paths += `<text x="32" y="37" text-anchor="middle" font-size="18" font-weight="700" fill="${textColor}" font-family="Space Mono, monospace">${level}</text>`;

            return `<svg class="pollen-indicator" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
        }

        // Level zu Text konvertieren
        function getLevelText(level) {
            //const levels = ['Kein Pollen', 'Sehr niedrig', 'Niedrig', 'Niedrig', 'Mittel', 'Mittel', 'Hoch'];
            const levels = ['No Pollen', 'Very Low', 'Low', 'Moderate', 'Elevated', 'High', 'Very High'];
            return translate(levels[level] || 'No Pollen');
        }

        function getDateFromLabel(index) {
            const date = new Date(pollenUpdateTime * 1000);
            date.setDate(date.getDate() + index);

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const targetDate = new Date(date);
            targetDate.setHours(0, 0, 0, 0);

            const diffDays = Math.round((targetDate - today) / 86400000);

            let label;

            if (diffDays === 0) {
                label = translate('Today');
            } else if (diffDays === 1) {
                label = translate('Tomorrow');
            } else if (diffDays === 2) {
                label = translate('In 2 days');
            } else {
                label = translate(date.toLocaleDateString('en-US', { weekday: 'long' }));
            }

            return {
                label,
                day: date.getDate(),
                month: translate(date.toLocaleDateString('en-US', { month: 'long' }))
            };
        }

        // State management
        let state = {
            orientation: 'vertical' // Orientation: 'vertical' or 'horizontal'
        };

        // Aus localStorage laden
        function loadState() {
            try {
                const saved = localStorage.getItem('pollen.orientation');
                if (saved) {
                    state.orientation = saved;
                }
            } catch (error) {
                console.error('Error loading state from localStorage:', error);
            }
        }

        // In localStorage speichern
        function saveState() {
            try {
                localStorage.setItem('pollen.orientation', state.orientation);
            } catch (error) {
                console.error('Error saving state to localStorage:', error);
            }
        }

        // Bestimme Anzahl der Tage aus den Daten
        function getDaysCount() {
            const firstPollen = Object.values(pollenIndexInfo)[0];
            return firstPollen ? firstPollen.length : 3;
        }

        // Forecast Grid rendern
        function renderForecast() {
            const grid = document.getElementById('forecastGrid');
            grid.className = `forecast-grid ${state.orientation}`;
            grid.innerHTML = '';

            const daysCount = getDaysCount();
            const pollenTypes = Object.keys(pollenIndexInfo);

            if (state.orientation === 'vertical') {
                // VERTIKAL: Zeile = Pollenart, Spalten = Tage
                // Header mit Tagen
                const headerRow = document.createElement('div');
                headerRow.className = 'day-header';

                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-label empty';
                emptyCell.innerHTML = `
                    <div class="orientation-toggle">
                        <button class="active" data-orientation="vertical" title="Vertikal">
                            <span>┃</span>
                        </button>
                        <button data-orientation="horizontal" title="Horizontal">
                            <span>━</span>
                        </button>
                    </div>
                `;
                headerRow.appendChild(emptyCell);

                for (let dayIdx = 0; dayIdx < daysCount; dayIdx++) {
                    const dayData = getDateFromLabel(dayIdx);
                    const dayLabel = document.createElement('div');
                    dayLabel.className = 'day-label';
                    // HEUTE / MORGEN / ÜBERMORGEN
                    const labelDiv = document.createElement('div');
                    labelDiv.textContent = dayData.label;
                    // Tageszahl
                    const numDiv = document.createElement('div');
                    numDiv.className = 'day-number';
                    numDiv.textContent = dayData.day;
                    // Monat
                    const monDiv = document.createElement('div');
                    monDiv.textContent = dayData.month;
                    dayLabel.appendChild(labelDiv);
                    dayLabel.appendChild(numDiv);
                    dayLabel.appendChild(monDiv);
                    headerRow.appendChild(dayLabel);
                }
                grid.appendChild(headerRow);

                // Pollenart-Zeilen
                pollenTypes.forEach(pollenKey => {
                    const row = document.createElement('div');
                    row.className = 'pollen-row';

                    const mapping = pollenNameMapping[pollenKey];
                    const icon = mapping ? pollenIcons[mapping.icon] : '';
                    const displayName = mapping ? mapping.displayName : pollenKey;
                    //console.log('Pollen Icon:', pollenKey, '->', displayName);

                    const label = document.createElement('div');
                    label.className = 'pollen-label';
                    label.innerHTML = `
                        <div class="pollen-icon">${icon}</div>
                        <span>${displayName}</span>
                    `;
                    row.appendChild(label);

                    const forecast = pollenIndexInfo[pollenKey];
                    for (let dayIdx = 0; dayIdx < daysCount; dayIdx++) {
                        const level = forecast[dayIdx] || 0;
                        const cell = document.createElement('div');
                        cell.className = 'pollen-cell';
                        cell.innerHTML = `
                            ${createIndicator(level)}
                            <div class="pollen-level">${getLevelText(level)}</div>
                        `;
                        row.appendChild(cell);
                    }

                    grid.appendChild(row);
                });

            } else {
                // HORIZONTAL: Zeile = Tag, Spalten = Pollenarten
                // Header mit Pollenarten
                const headerRow = document.createElement('div');
                headerRow.className = 'pollen-header';

                const emptyCell = document.createElement('div');
                emptyCell.className = 'pollen-label-header empty';
                emptyCell.innerHTML = `
                    <div class="orientation-toggle">
                        <button data-orientation="vertical" title="Vertikal">
                            <span>┃</span>
                        </button>
                        <button class="active" data-orientation="horizontal" title="Horizontal">
                            <span>━</span>
                        </button>
                    </div>
                `;
                headerRow.appendChild(emptyCell);

                pollenTypes.forEach(pollenKey => {
                    const mapping = pollenNameMapping[pollenKey];
                    const icon = mapping ? pollenIcons[mapping.icon] : '';
                    const displayName = mapping ? mapping.displayName : pollenKey;
                    console.log('Pollen Icon:', pollenKey, '->', displayName);

                    const pollenHeader = document.createElement('div');
                    pollenHeader.className = 'pollen-label-header';
                    pollenHeader.innerHTML = `
                        <div class="pollen-icon">${icon}</div>
                        <span>${displayName}</span>
                    `;
                    headerRow.appendChild(pollenHeader);
                });
                grid.appendChild(headerRow);

                // Tag-Zeilen
                for (let dayIdx = 0; dayIdx < daysCount; dayIdx++) {
                    const row = document.createElement('div');
                    row.className = 'day-row';

                    const dayData = getDateFromLabel(dayIdx);
                    const dayLabel = document.createElement('div');
                    dayLabel.className = 'day-label';
                    // HEUTE / MORGEN / ÜBERMORGEN
                    const labelDiv = document.createElement('div');
                    labelDiv.textContent = dayData.label;
                    // Tageszahl
                    const numDiv = document.createElement('div');
                    numDiv.className = 'day-number';
                    numDiv.textContent = dayData.day;
                    // Monat
                    const monDiv = document.createElement('div');
                    monDiv.textContent = dayData.month;
                    dayLabel.appendChild(labelDiv);
                    dayLabel.appendChild(numDiv);
                    dayLabel.appendChild(monDiv);
                    row.appendChild(dayLabel);

                    pollenTypes.forEach(pollenKey => {
                        const forecast = pollenIndexInfo[pollenKey];
                        const level = forecast[dayIdx] || 0;

                        const cell = document.createElement('div');
                        cell.className = 'pollen-cell';
                        cell.innerHTML = `
                            ${createIndicator(level)}
                            <div class="pollen-level">${getLevelText(level)}</div>
                        `;
                        row.appendChild(cell);
                    });

                    grid.appendChild(row);
                }
            }
        }

        // Event Listeners - use event delegation for dynamically created buttons
        document.getElementById('forecastGrid').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-orientation]');
            if (btn) {
                const newOrientation = btn.dataset.orientation;
                if (newOrientation !== state.orientation) {
                    state.orientation = newOrientation;
                    saveState();
                    renderForecast();
                }
            }
        });

        // Initialisierung
        loadState();
        renderForecast();
    </script>
</body>

</html>
